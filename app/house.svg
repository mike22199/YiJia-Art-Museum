<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#111315"/>
      <stop offset="1" stop-color="#2a2c2f"/>
    </linearGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2d2f33"/>
      <stop offset="1" stop-color="#1d1f22"/>
    </linearGradient>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a3d42"/>
      <stop offset="1" stop-color="#2b2e33"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)"/>

  <!-- ground -->
  <rect y="540" width="1200" height="160" fill="#16181b"/>
  <path d="M0 560 C260 520, 420 590, 650 560 C860 532, 980 585, 1200 550 L1200 700 L0 700 Z" fill="#101215" opacity="0.9"/>

  <!-- house -->
  <g filter="url(#softShadow)">
    <!-- roof -->
    <path d="M250 340 L600 150 L950 340 L890 340 L600 210 L310 340 Z" fill="url(#roof)" stroke="#4b4f56" stroke-opacity="0.35"/>
    <!-- main wall -->
    <rect x="330" y="340" width="540" height="250" rx="22" fill="url(#wall)" stroke="#5a5f67" stroke-opacity="0.25"/>
    <!-- side depth -->
    <path d="M870 340 L930 340 L930 590 L870 590 Z" fill="#22252a" opacity="0.9"/>

    <!-- simple windows -->
    <g opacity="0.85">
      <rect x="390" y="405" width="150" height="120" rx="14" fill="#15171a" stroke="#676d77" stroke-opacity="0.25"/>
      <rect x="660" y="405" width="150" height="120" rx="14" fill="#15171a" stroke="#676d77" stroke-opacity="0.25"/>
      <path d="M465 405 V525" stroke="#676d77" stroke-opacity="0.22"/>
      <path d="M390 465 H540" stroke="#676d77" stroke-opacity="0.22"/>
      <path d="M735 405 V525" stroke="#676d77" stroke-opacity="0.22"/>
      <path d="M660 465 H810" stroke="#676d77" stroke-opacity="0.22"/>
    </g>

    <!-- door -->
    <rect x="560" y="430" width="80" height="160" rx="16" fill="#1b1e22" stroke="#6f7681" stroke-opacity="0.22"/>
    <circle cx="625" cy="510" r="6" fill="#7a818c" opacity="0.7"/>

    <!-- wall sign board (banner mount area) -->
    <rect x="430" y="350" width="340" height="46" rx="14" fill="#0f1113" opacity="0.55" stroke="#8b929c" stroke-opacity="0.12"/>
    <text x="600" y="382" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="20" fill="#cfd3d9" opacity="0.72" letter-spacing="2">FIFI</text>
  </g>

  <!-- subtle fog -->
  <rect x="0" y="0" width="1200" height="700" fill="white" opacity="0.03"/>
</svg>
